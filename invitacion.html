<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Especial 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

* {
  box-sizing: border-box;
}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  font-family:'Poppins',sans-serif;
  overflow-x:hidden;
  padding: 20px;
}

#sobre{
  width:260px;
  height:180px;
  background:#e63946;
  border-radius:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:22px;
  cursor:pointer;
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
  transition: transform 0.3s ease;
}

#sobre:hover {
  transform: scale(1.05);
}

#carta{
  display:none;
  position:relative;
  background:white;
  padding:35px;
  width:100%;
  max-width:500px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  text-align:center;
  animation: aparecer 0.5s ease-in;
}

@keyframes aparecer {
  from {
    opacity: 0;
    transform: scale(0.95);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

h1{
  font-family:'Great Vibes',cursive;
  font-size:42px;
  color:#e63946;
  margin: 0 0 20px 0;
}

#texto{
  font-size:16px;
  min-height:120px;
  line-height: 1.6;
  color: #333;
}

.fecha{
  margin-top:20px;
  font-weight:bold;
  color: #e63946;
  font-size: 14px;
}

.botones-container {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 25px;
}

.boton{
  padding:12px 20px;
  background:#e63946;
  border:none;
  color:white;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
  font-weight: 500;
  transition: background 0.3s ease;
  width: 100%;
}

.boton:hover {
  background: #d62828;
}

.boton.secundario {
  background: #666;
}

.boton.secundario:hover {
  background: #444;
}

.boton.cerrar {
  background: #ccc;
  color: #333;
  margin-top: 10px;
}

.boton.cerrar:hover {
  background: #aaa;
}

.corazon{
  position:fixed;
  color:red;
  animation:subir 4s linear infinite;
  pointer-events: none;
  z-index: 1;
}

@keyframes subir{
  from{transform:translateY(0);opacity:1;}
  to{transform:translateY(-900px);opacity:0;}
}

iframe{
  margin-top:15px;
  border-radius:10px;
  width: 100%;
  max-width: 300px;
  height: 170px;
}

.enlace-info {
  font-size: 12px;
  color: #999;
  margin-top: 10px;
}

@media (max-width: 600px) {
  h1 {
    font-size: 32px;
  }
  
  #carta {
    padding: 25px;
  }
  
  #texto {
    font-size: 14px;
  }
  
  iframe {
    height: 150px;
  }
}

</style>
</head>

<body>

<div id="sobre" onclick="abrirCarta()">
  Abrir carta 💌
</div>

<div id="carta">

  <h1>Invitación Especial</h1>

  <p id="texto"></p>

  <p class="fecha">
    📅 Fecha: 14 de Marzo de 2026
  </p>

  <div class="botones-container">
    <button class="boton" onclick="enviarWhatsApp()">
      📱 Enviar por WhatsApp
    </button>
    
    <button class="boton secundario" onclick="copiarEnlace()">
      🔗 Copiar Enlace
    </button>
  </div>

  <p class="enlace-info" id="mensajeCopia" style="display:none; color:#4CAF50;">✓ ¡Enlace copiado!</p>

  <!-- canción desde la mejor parte (1 minuto) -->
  <iframe width="300" height="170"
    src="https://www.youtube.com/embed/dT2owtxkU8k?start=60"
    allow="autoplay; encrypted-media"
    allowfullscreen>
  </iframe>

  <button class="boton cerrar" onclick="cerrarCarta()">
    Cerrar
  </button>

</div>

<script>

const mensaje="Hola hermosa señorita,\n\nCordialmente usted ha sido invitada a compartir un momento íntimo con su pareja para disfrutar de la cercanía, el deseo y la conexión especial entre ambos.\n\nEsta invitación es exclusiva y especial para ustedes. Te esperamos con amor y romance.\n\n¡Que disfrutes esta noche inolvidable! 💕";

let i=0;
let corazonesActivos = false;

function escribir(){
  if(i < mensaje.length){
    document.getElementById("texto").innerHTML += mensaje.charAt(i);
    i++;
    setTimeout(escribir,40);
  }
}

function abrirCarta(){
  document.getElementById("sobre").style.display="none";
  document.getElementById("carta").style.display="block";
  
  escribir();
  
  if (!corazonesActivos) {
    corazonesActivos = true;
    setInterval(crearCorazon,300);
  }
}

function cerrarCarta(){
  document.getElementById("sobre").style.display="flex";
  document.getElementById("carta").style.display="none";
  document.getElementById("texto").innerHTML = "";
  document.getElementById("mensajeCopia").style.display = "none";
  i = 0;
  corazonesActivos = false;
}

function crearCorazon(){
  if (!corazonesActivos) return;
  
  const c=document.createElement("div");
  c.classList.add("corazon");
  c.innerHTML="❤";
  c.style.left=Math.random()*100+"vw";
  c.style.fontSize=(Math.random()*20+10)+"px";
  
  document.body.appendChild(c);
  
  setTimeout(()=>{c.remove();},4000);
}

function enviarWhatsApp(){
  // Mensaje mejorado para WhatsApp
  const textoWhatsApp = "🌹 ¡Hola! Tengo una invitación especial para ti. Abre este enlace y descubre algo especial:\n\n" + window.location.href + "\n\n💕 ¡No te lo pierdas!";
  
  const url="https://wa.me/?text="+encodeURIComponent(textoWhatsApp);
  
  window.open(url,"_blank");
}

function copiarEnlace(){
  const enlace = window.location.href;
  
  // Copiar al portapapeles
  navigator.clipboard.writeText(enlace).then(function() {
    // Mostrar mensaje de confirmación
    const mensaje = document.getElementById("mensajeCopia");
    mensaje.style.display = "block";
    
    // Ocultar mensaje después de 2 segundos
    setTimeout(() => {
      mensaje.style.display = "none";
    }, 2000);
  }).catch(function(err) {
    alert('No se pudo copiar el enlace');
  });
}

</script>

</body>
</html>
